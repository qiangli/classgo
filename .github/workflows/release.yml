name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        run: |
          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
          )
          mkdir -p bin
          # Cross-compile classgo
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="classgo-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then output="${output}.exe"; fi
            echo "Building ${output}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -o "bin/${output}" .
          done
          # Cross-compile rclone from submodule
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="rclone-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then output="${output}.exe"; fi
            echo "Building ${output}..."
            (cd rclone-src && GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s" -trimpath -o "../bin/${output}" .)
          done

      - name: Package archives
        run: |
          mkdir -p dist
          platforms=("darwin-amd64" "darwin-arm64" "linux-amd64" "linux-arm64" "windows-amd64")
          for p in "${platforms[@]}"; do
            os="${p%%-*}"
            stage="dist/classgo-${p}"
            mkdir -p "$stage"
            if [ "$os" = "windows" ]; then
              cp "bin/classgo-${p}.exe" "$stage/classgo.exe"
              cp "bin/rclone-${p}.exe" "$stage/rclone.exe"
            else
              cp "bin/classgo-${p}" "$stage/classgo"
              cp "bin/rclone-${p}" "$stage/rclone"
            fi
            cp config.json.example "$stage/config.json.example"
            cp -r data/csv.example "$stage/data"
            rm -rf "$stage/data/backups" "$stage/data/memos" "$stage/data/attendances"
            # Create archive
            if [ "$os" = "windows" ]; then
              (cd "$stage" && zip -qr "../classgo-${p}.zip" .)
            else
              tar czf "dist/classgo-${p}.tar.gz" -C "$stage" .
            fi
            echo "Packaged classgo-${p}"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
