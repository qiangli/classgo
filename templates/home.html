<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - Home</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script src="/static/js/toast.js"></script>
    <script>
        (function(){
            var t=localStorage.getItem('classgo-theme')||'system';
            if(t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme:dark)').matches))
                document.documentElement.classList.add('dark');
        })();
    </script>
    <style>
        .dark body { color: #e5e7eb; }
        .app-tile { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .app-tile:hover { transform: scale(1.08); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .star-btn { opacity: 0; transition: opacity 0.15s ease; }
        .app-tile-wrap:hover .star-btn, .edit-mode .star-btn { opacity: 1; }
        .star-btn.starred { opacity: 1; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        #bg-image {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><linearGradient id="g1" x1="0%25" y1="0%25" x2="100%25" y2="100%25"><stop offset="0%25" style="stop-color:%234338ca"/><stop offset="50%25" style="stop-color:%237c3aed"/><stop offset="100%25" style="stop-color:%23ec4899"/></linearGradient></defs><rect fill="url(%23g1)" width="1200" height="800"/><circle cx="200" cy="600" r="300" fill="%234338ca" opacity="0.3"/><circle cx="900" cy="200" r="250" fill="%23ec4899" opacity="0.2"/><circle cx="600" cy="400" r="350" fill="%237c3aed" opacity="0.15"/></svg>');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen relative">

    <!-- Background image layer -->
    <div id="bg-image" class="fixed inset-0 opacity-40 pointer-events-none hidden"></div>

    <!-- Top bar -->
    <header class="fixed top-0 right-0 left-0 z-30 flex items-center justify-between px-5 py-3">
        <div class="flex items-center gap-3">
            <img src="/static/lern.png" alt="{{.AppName}}" class="h-9 max-w-[200px] object-contain">
        </div>
        <div class="flex items-center gap-2">
            <span class="text-sm text-gray-500 dark:text-gray-400">{{.UserName}}</span>
            <span class="inline-block px-2 py-0.5 rounded text-xs font-medium
                {{if eq .UserType "teacher"}}bg-purple-100 text-purple-700 dark:bg-purple-900/50 dark:text-purple-300
                {{else if eq .UserType "parent"}}bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300
                {{else}}bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300{{end}}">{{.UserType}}</span>
            <!-- Theme toggle -->
            <button id="theme-btn" onclick="cycleTheme()" class="flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 bg-white/80 dark:bg-gray-800/80 backdrop-blur hover:bg-white dark:hover:bg-gray-700 px-3 py-1.5 rounded-lg transition" title="Toggle theme">
                <span id="theme-icon"></span>
                <span id="theme-label" class="text-xs font-medium"></span>
            </button>
            <!-- Edit button -->
            <button id="edit-btn" onclick="toggleEditMode()" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 bg-white/80 dark:bg-gray-800/80 backdrop-blur hover:bg-white dark:hover:bg-gray-700 p-2 rounded-lg transition" title="Customize page">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
            </button>
            <!-- Profile -->
            <a href="/profile" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 bg-white/80 dark:bg-gray-800/80 backdrop-blur hover:bg-white dark:hover:bg-gray-700 p-2 rounded-lg transition" title="My Profile">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </a>
            <!-- Logout -->
            <a href="/logout" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 bg-white/80 dark:bg-gray-800/80 backdrop-blur hover:bg-white dark:hover:bg-gray-700 p-2 rounded-lg transition" title="Sign out">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 pt-24 pb-16 relative z-10">

        <!-- Message Section (untitled) -->
        <section id="section-message" class="mb-10">
            <div class="bg-white/90 dark:bg-white/10 backdrop-blur-lg rounded-2xl p-5 flex items-start gap-4 shadow-lg dark:shadow-none border border-gray-200/50 dark:border-white/10">
                <div class="w-12 h-12 bg-indigo-500 rounded-xl flex items-center justify-center flex-shrink-0">
                    <img src="/static/lern.png" alt="" class="h-8 max-w-[40px] object-contain">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-gray-800 dark:text-white font-semibold text-sm">Welcome to {{.AppName}}</p>
                    <p class="text-gray-600 dark:text-white/70 text-sm mt-1">Your learning hub. Access tasks, notes, and more from one place.</p>
                </div>
                <button onclick="dismissMessage()" class="text-gray-400 dark:text-white/40 hover:text-gray-600 dark:hover:text-white/80 text-xl leading-none flex-shrink-0 mt-1">&times;</button>
            </div>
        </section>

        <!-- Favorites Section -->
        <section id="section-favorites" class="mb-10">
            <h2 class="text-gray-700 dark:text-white/60 text-xs font-semibold uppercase tracking-wider mb-4">Favorites</h2>
            <div id="favorites-grid" class="flex flex-wrap gap-6"></div>
            <div id="favorites-empty" class="hidden text-gray-400 dark:text-white/30 text-sm">No favorites yet. Star an app below to add it here.</div>
        </section>

        <!-- Recent Section -->
        <section id="section-recent" class="mb-10">
            <h2 class="text-gray-700 dark:text-white/60 text-xs font-semibold uppercase tracking-wider mb-4">Recently Visited</h2>
            <div id="recent-list" class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide"></div>
            <div id="recent-empty" class="hidden text-gray-400 dark:text-white/30 text-sm">No recent visits yet.</div>
        </section>

        <!-- All Apps Section -->
        <section id="section-all" class="mb-10">
            <h2 class="text-gray-700 dark:text-white/60 text-xs font-semibold uppercase tracking-wider mb-4">All</h2>
            <div id="all-grid" class="flex flex-wrap gap-6"></div>
        </section>

    </main>

    <!-- Edit Mode Panel -->
    <div id="edit-panel" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="toggleEditMode()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 w-80">
            <h3 class="text-gray-800 dark:text-gray-100 font-semibold text-base mb-5">Customize Home</h3>
            <div class="space-y-4">
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-gray-700 dark:text-gray-300">Message</span>
                    <input type="checkbox" id="toggle-message" onchange="toggleSection('message', this.checked)" class="w-5 h-5 accent-indigo-600 rounded">
                </label>
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-gray-700 dark:text-gray-300">Favorites</span>
                    <input type="checkbox" id="toggle-favorites" onchange="toggleSection('favorites', this.checked)" class="w-5 h-5 accent-indigo-600 rounded">
                </label>
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-gray-700 dark:text-gray-300">Recently Visited</span>
                    <input type="checkbox" id="toggle-recent" onchange="toggleSection('recent', this.checked)" class="w-5 h-5 accent-indigo-600 rounded">
                </label>
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-gray-700 dark:text-gray-300">All Apps</span>
                    <input type="checkbox" id="toggle-all" onchange="toggleSection('all', this.checked)" class="w-5 h-5 accent-indigo-600 rounded">
                </label>
                <hr class="border-gray-200 dark:border-gray-700">
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm text-gray-700 dark:text-gray-300">Background Image</span>
                    <input type="checkbox" id="toggle-bg" onchange="toggleBgImage(this.checked)" class="w-5 h-5 accent-indigo-600 rounded">
                </label>
            </div>
            <button onclick="toggleEditMode()" class="mt-6 w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg font-medium transition">Done</button>
        </div>
    </div>

    <script src="/static/js/theme.js"></script>
    <script>
        const userType = '{{.UserType}}';
        const entityID = '{{.EntityID}}';

        // ==================== APP REGISTRY ====================
        const APPS = [
            { id: 'tasks',   label: 'Tasks',   url: '/dashboard', letter: 'T', color: 'bg-blue-500' },
            { id: 'memos',   label: 'Memos',   url: '/memos/',    letter: 'M', color: 'bg-orange-500' },
            { id: 'profile', label: 'Profile',  url: '/profile',   letter: 'P', color: 'bg-emerald-500' },
        ];

        // ==================== STATE ====================
        let prefs = {
            favorites: ['tasks', 'memos'],
            recent: [],
            sections: { message: true, favorites: true, recent: true, all: true },
            bgEnabled: false,
            messageDismissed: false
        };
        let editMode = false;

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // ==================== PREFERENCES ====================
        async function loadPrefs() {
            try {
                const res = await fetch('/api/v1/preferences');
                const data = await res.json();
                if (data.home_favorites) prefs.favorites = JSON.parse(data.home_favorites);
                if (data.home_recent) prefs.recent = JSON.parse(data.home_recent);
                if (data.home_sections) prefs.sections = JSON.parse(data.home_sections);
                if (data.home_bg_enabled) prefs.bgEnabled = data.home_bg_enabled === 'true';
                if (data.home_message_dismissed) prefs.messageDismissed = data.home_message_dismissed === 'true';
            } catch(e) {
                // Use defaults
            }
        }

        async function savePref(key, value) {
            try {
                const body = {};
                body[key] = typeof value === 'string' ? value : JSON.stringify(value);
                await fetch('/api/v1/preferences', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
            } catch(e) {}
        }

        // ==================== RENDERING ====================
        function renderTile(app, showStar) {
            const isFav = prefs.favorites.includes(app.id);
            const starClass = isFav ? 'starred text-yellow-400' : 'text-gray-400 dark:text-white/30';
            const starIcon = isFav
                ? '<path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>';
            const starFill = isFav ? 'currentColor' : 'none';

            return `<div class="app-tile-wrap flex flex-col items-center gap-2 relative">
                <div onclick="navigateToApp('${app.id}')" class="app-tile w-16 h-16 sm:w-20 sm:h-20 ${app.color} rounded-2xl flex items-center justify-center cursor-pointer shadow-lg">
                    <span class="text-white text-2xl sm:text-3xl font-bold select-none">${app.letter}</span>
                </div>
                <span class="text-gray-600 dark:text-white/70 text-xs truncate max-w-[80px] text-center">${esc(app.label)}</span>
                ${showStar ? `<button onclick="toggleFavorite('${app.id}')" class="star-btn ${starClass} absolute -top-1 -right-1 p-1 rounded-full bg-white/90 dark:bg-gray-800/90 shadow-sm hover:scale-110 transition">
                    <svg class="w-4 h-4" fill="${starFill}" stroke="currentColor" viewBox="0 0 24 24">${starIcon}</svg>
                </button>` : ''}
            </div>`;
        }

        function renderRecentItem(app) {
            return `<a onclick="navigateToApp('${app.id}')" class="flex-shrink-0 bg-white/80 dark:bg-white/10 backdrop-blur rounded-xl px-4 py-3 flex items-center gap-3 cursor-pointer hover:bg-white dark:hover:bg-white/15 transition shadow-sm border border-gray-200/50 dark:border-white/10">
                <div class="w-8 h-8 ${app.color} rounded-lg flex items-center justify-center">
                    <span class="text-white text-sm font-bold">${app.letter}</span>
                </div>
                <span class="text-gray-700 dark:text-white/80 text-sm whitespace-nowrap">${esc(app.label)}</span>
            </a>`;
        }

        function render() {
            // Sections visibility
            Object.entries(prefs.sections).forEach(([key, visible]) => {
                const el = document.getElementById('section-' + key);
                if (el) el.classList.toggle('hidden', !visible);
            });

            // Message dismissed
            if (prefs.messageDismissed && prefs.sections.message) {
                document.getElementById('section-message').classList.add('hidden');
            }

            // Background
            document.getElementById('bg-image').classList.toggle('hidden', !prefs.bgEnabled);

            // Favorites
            const favApps = APPS.filter(a => prefs.favorites.includes(a.id));
            const favGrid = document.getElementById('favorites-grid');
            const favEmpty = document.getElementById('favorites-empty');
            if (favApps.length > 0) {
                favGrid.innerHTML = favApps.map(a => renderTile(a, false)).join('');
                favGrid.classList.remove('hidden');
                favEmpty.classList.add('hidden');
            } else {
                favGrid.classList.add('hidden');
                favEmpty.classList.remove('hidden');
            }

            // Recent
            const recentApps = prefs.recent
                .map(r => APPS.find(a => a.id === r.id))
                .filter(Boolean)
                .slice(0, 6);
            const recentList = document.getElementById('recent-list');
            const recentEmpty = document.getElementById('recent-empty');
            if (recentApps.length > 0) {
                recentList.innerHTML = recentApps.map(a => renderRecentItem(a)).join('');
                recentList.classList.remove('hidden');
                recentEmpty.classList.add('hidden');
            } else {
                recentList.classList.add('hidden');
                recentEmpty.classList.remove('hidden');
            }

            // All
            document.getElementById('all-grid').innerHTML = APPS.map(a => renderTile(a, true)).join('');

            // Edit panel checkboxes
            Object.entries(prefs.sections).forEach(([key, visible]) => {
                const cb = document.getElementById('toggle-' + key);
                if (cb) cb.checked = visible;
            });
            const bgCb = document.getElementById('toggle-bg');
            if (bgCb) bgCb.checked = prefs.bgEnabled;
        }

        // ==================== ACTIONS ====================
        function navigateToApp(appId) {
            const app = APPS.find(a => a.id === appId);
            if (!app) return;

            // Update recent
            prefs.recent = prefs.recent.filter(r => r.id !== appId);
            prefs.recent.unshift({ id: appId, ts: Date.now() });
            prefs.recent = prefs.recent.slice(0, 10);
            savePref('home_recent', prefs.recent);

            window.location.href = app.url;
        }

        function toggleFavorite(appId) {
            const idx = prefs.favorites.indexOf(appId);
            if (idx >= 0) {
                prefs.favorites.splice(idx, 1);
            } else {
                prefs.favorites.push(appId);
            }
            savePref('home_favorites', prefs.favorites);
            render();
        }

        function dismissMessage() {
            prefs.messageDismissed = true;
            savePref('home_message_dismissed', 'true');
            document.getElementById('section-message').classList.add('hidden');
        }

        function toggleEditMode() {
            editMode = !editMode;
            document.getElementById('edit-panel').classList.toggle('hidden', !editMode);
            document.body.classList.toggle('edit-mode', editMode);
        }

        function toggleSection(key, visible) {
            prefs.sections[key] = visible;
            savePref('home_sections', prefs.sections);
            render();
        }

        function toggleBgImage(enabled) {
            prefs.bgEnabled = enabled;
            savePref('home_bg_enabled', enabled ? 'true' : 'false');
            render();
        }

        // ==================== INIT ====================
        async function init() {
            await loadPrefs();
            render();
        }
        init();
    </script>
</body>
</html>
