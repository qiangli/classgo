<!DOCTYPE html>
<html lang="en">
<head>
    <base href="{{.BasePath}}/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} — Admin Login</title>
    <link rel="icon" href="static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="static/css/tailwind.css">
    <script>
        (function(){
            var t=localStorage.getItem('classgo-theme')||'system';
            if(t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme:dark)').matches))
                document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="static/js/toast.js"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto px-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
            <div class="text-center mb-6">
                <img src="static/lern.png" alt="{{.AppName}}" class="h-12 mx-auto">
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Admin Login</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1">System Username</label>
                    <input type="text" id="admin-username" required autocomplete="username"
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none text-sm"
                        placeholder="OS username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-1">System Password</label>
                    <div class="relative">
                        <input type="password" id="admin-password" required autocomplete="current-password"
                            class="w-full pl-4 pr-10 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none text-sm"
                            placeholder="OS password"
                            onkeydown="if(event.key==='Enter') submitAdminLogin()">
                        <button type="button" id="admin-password-toggle" onclick="toggleAdminPassword()" aria-label="Show password"
                            class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 focus:outline-none">
                            <svg id="admin-password-eye" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg id="admin-password-eye-off" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411M9.88 9.88l4.242 4.242M14.121 14.121L17.41 17.41"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="admin-error" class="hidden bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm rounded-lg px-4 py-2"></div>
                <button onclick="submitAdminLogin()" id="admin-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition text-sm">
                    Sign In
                </button>
            </div>
        </div>
    </div>

    <script>
        function toggleAdminPassword() {
            const input = document.getElementById('admin-password');
            const eye = document.getElementById('admin-password-eye');
            const eyeOff = document.getElementById('admin-password-eye-off');
            const btn = document.getElementById('admin-password-toggle');
            const showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            eye.classList.toggle('hidden', !showing);
            eyeOff.classList.toggle('hidden', showing);
            btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        }

        async function submitAdminLogin() {
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('admin-error');
            const btn = document.getElementById('admin-btn');

            if (!username || !password) {
                errorEl.textContent = 'Username and password required';
                errorEl.classList.remove('hidden');
                return;
            }

            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const result = await res.json();
                if (result.ok) {
                    window.location.href = result.redirect || '/admin';
                } else {
                    errorEl.textContent = result.error || 'Login failed';
                    errorEl.classList.remove('hidden');
                }
            } catch(e) {
                errorEl.textContent = 'Connection error';
                errorEl.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = 'Sign In';
        }

        document.getElementById('admin-username').focus();
    </script>
    <script src="static/js/theme.js"></script>
</body>
</html>
