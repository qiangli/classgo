<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - Kiosk</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center select-none">

    <!-- Success Overlay -->
    <div id="success-overlay" class="hidden fixed inset-0 bg-green-500 flex flex-col items-center justify-center z-50">
        <div class="text-white" style="font-size:10rem">&#10003;</div>
        <p id="success-name" class="text-white text-6xl font-bold mt-4"></p>
        <p id="success-status" class="text-green-100 text-3xl mt-3">Signed in!</p>
    </div>

    <!-- Check-Out Success Overlay -->
    <div id="checkout-overlay" class="hidden fixed inset-0 bg-orange-500 flex flex-col items-center justify-center z-50">
        <div class="text-white" style="font-size:10rem">&#128075;</div>
        <p id="checkout-name" class="text-white text-6xl font-bold mt-4"></p>
        <p class="text-orange-100 text-3xl mt-3">Signed out!</p>
    </div>

    <!-- Main Kiosk UI -->
    <div class="w-full max-w-2xl p-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="text-left">
                <img src="/static/lern.png" alt="{{.AppName}}" class="h-20">
                <p id="step-label" class="text-gray-400 mt-3 text-2xl">Enter your name</p>
            </div>
            <div class="text-center">
                <img id="qr-img" src="{{.QRDataURIMDNS}}" alt="QR Code"
                    class="w-44 h-44 rounded-xl cursor-pointer" title="Tap to toggle IP/mDNS"
                    onclick="toggleQR()"
                    data-qr-mdns="{{.QRDataURIMDNS}}" data-qr-ip="{{.QRDataURIIP}}">
                <p id="qr-url" class="text-xs text-gray-500 mt-1 break-all">{{.ServerURLMDNS}}</p>
            </div>
        </div>

        <!-- Display -->
        <div class="bg-gray-800 rounded-2xl p-8 mb-8 text-center">
            <p id="display" class="text-6xl font-mono text-white tracking-widest min-h-[4.5rem]">&nbsp;</p>
            <div id="error-msg" class="hidden text-red-400 text-lg mt-3"></div>
        </div>

        <!-- Name Input (first step) -->
        <div id="name-step" class="mb-8">
            <div class="relative">
                <input type="text" id="name-input"
                    class="w-full px-6 py-5 bg-gray-800 text-white text-2xl text-center rounded-2xl border-2 border-gray-700 focus:border-indigo-500 outline-none"
                    placeholder="Search by name or ID" autocomplete="off">
                <input type="hidden" id="kiosk-student-id" value="">
                <ul id="kiosk-search-results" class="hidden absolute z-50 left-0 right-0 mt-1 bg-gray-800 border border-gray-600 rounded-2xl shadow-lg max-h-72 overflow-y-auto"></ul>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <button onclick="startCheckIn()"
                    class="py-5 bg-indigo-600 hover:bg-indigo-700 text-white text-2xl font-bold rounded-2xl transition">
                    Check In
                </button>
                <button onclick="startCheckOut()"
                    class="py-5 bg-orange-500 hover:bg-orange-600 text-white text-2xl font-bold rounded-2xl transition">
                    Check Out
                </button>
            </div>
        </div>

        <!-- Keypad (for PIN entry) -->
        <div id="keypad" class="hidden grid grid-cols-3 gap-3">
            <button onclick="press('1')" class="kbtn">1</button>
            <button onclick="press('2')" class="kbtn">2</button>
            <button onclick="press('3')" class="kbtn">3</button>
            <button onclick="press('4')" class="kbtn">4</button>
            <button onclick="press('5')" class="kbtn">5</button>
            <button onclick="press('6')" class="kbtn">6</button>
            <button onclick="press('7')" class="kbtn">7</button>
            <button onclick="press('8')" class="kbtn">8</button>
            <button onclick="press('9')" class="kbtn">9</button>
            <button onclick="backspace()" class="kbtn bg-gray-700 text-gray-300">&#9003;</button>
            <button onclick="press('0')" class="kbtn">0</button>
            <button onclick="submitPIN()" id="submit-btn" class="kbtn bg-indigo-600 text-white hover:bg-indigo-700">&#10148;</button>
        </div>
    </div>

    <style>
        .kbtn {
            padding: 1.25rem;
            font-size: 2rem;
            font-weight: 700;
            background: #374151;
            color: #e5e7eb;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .kbtn:active {
            background: #4b5563;
            transform: scale(0.95);
        }
    </style>

    <script>
        let qrShowingMDNS = true;
        const qrURLMDNS = "{{.ServerURLMDNS}}";
        const qrURLIP = "{{.ServerURLIP}}";

        function toggleQR() {
            const img = document.getElementById('qr-img');
            const urlEl = document.getElementById('qr-url');
            qrShowingMDNS = !qrShowingMDNS;
            if (qrShowingMDNS) {
                img.src = img.dataset.qrMdns;
                urlEl.textContent = qrURLMDNS;
            } else {
                img.src = img.dataset.qrIp;
                urlEl.textContent = qrURLIP;
            }
        }

        let mode = ''; // 'checkin' or 'checkout'
        let studentName = '';
        let studentId = '';
        let currentInput = '';
        let kioskPinRequired = true;

        const display = document.getElementById('display');
        const stepLabel = document.getElementById('step-label');
        const errorMsg = document.getElementById('error-msg');
        const keypad = document.getElementById('keypad');
        const nameStep = document.getElementById('name-step');
        const nameInput = document.getElementById('name-input');
        const kioskStudentId = document.getElementById('kiosk-student-id');
        const kioskSearchResults = document.getElementById('kiosk-search-results');

        let kioskSearchTimeout = null;

        // Fetch settings
        fetch('/api/settings').then(r => r.json()).then(s => {
            kioskPinRequired = s.require_pin;
        }).catch(() => {});

        nameInput.addEventListener('input', () => {
            kioskStudentId.value = '';
            studentId = '';
            const q = nameInput.value.trim();
            if (q.length < 1) {
                kioskSearchResults.classList.add('hidden');
                return;
            }
            clearTimeout(kioskSearchTimeout);
            kioskSearchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/students/search?q=' + encodeURIComponent(q));
                    const students = await res.json();
                    if (!students.length) {
                        kioskSearchResults.classList.add('hidden');
                        return;
                    }
                    kioskSearchResults.innerHTML = students.map(s =>
                        `<li data-id="${s.id}" data-name="${s.first_name} ${s.last_name}"
                             class="px-6 py-4 cursor-pointer hover:bg-gray-700 border-b border-gray-700 last:border-0 text-lg text-white">
                            <span class="font-medium">${s.first_name} ${s.last_name}</span>
                            <span class="text-gray-400 ml-2">(${s.id})</span>
                            ${s.grade ? `<span class="text-gray-500 text-sm ml-2">Grade ${s.grade}</span>` : ''}
                        </li>`
                    ).join('');
                    kioskSearchResults.querySelectorAll('li').forEach(li => {
                        li.addEventListener('click', () => {
                            nameInput.value = li.dataset.name;
                            kioskStudentId.value = li.dataset.id;
                            studentId = li.dataset.id;
                            kioskSearchResults.classList.add('hidden');
                        });
                    });
                    kioskSearchResults.classList.remove('hidden');
                } catch (err) {
                    kioskSearchResults.classList.add('hidden');
                }
            }, 300);
        });

        function updateDisplay() {
            display.textContent = currentInput.replace(/./g, '\u2022') || '\u00A0';
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => errorMsg.classList.add('hidden'), 3000);
        }

        function startCheckIn() {
            const name = nameInput.value.trim();
            if (!name) return;
            studentName = name;
            studentId = kioskStudentId.value || '';
            kioskSearchResults.classList.add('hidden');
            mode = 'checkin';
            currentInput = '';
            if (!kioskPinRequired) {
                doCheckIn();
                return;
            }
            stepLabel.textContent = 'Enter PIN to check in';
            nameStep.classList.add('hidden');
            keypad.classList.remove('hidden');
            updateDisplay();
        }

        async function startCheckOut() {
            const name = nameInput.value.trim();
            if (!name) return;
            try {
                const res = await fetch('/api/status?student_name=' + encodeURIComponent(name));
                const data = await res.json();
                if (!data.checked_in || data.checked_out) {
                    showError(name + ' is not checked in');
                    return;
                }
            } catch (err) {
                showError('Connection error');
                return;
            }
            studentName = name;
            studentId = kioskStudentId.value || '';
            kioskSearchResults.classList.add('hidden');
            mode = 'checkout';
            currentInput = '';
            if (!kioskPinRequired) {
                doCheckOut();
                return;
            }
            stepLabel.textContent = 'Enter PIN to check out';
            nameStep.classList.add('hidden');
            keypad.classList.remove('hidden');
            updateDisplay();
        }

        function press(digit) {
            if (currentInput.length >= 4) return;
            currentInput += digit;
            updateDisplay();
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        function submitPIN() {
            if (currentInput.length !== 4) {
                showError('PIN must be 4 digits');
                return;
            }
            if (mode === 'checkin') {
                doCheckIn();
            } else {
                doCheckOut();
            }
        }

        // Allow Enter key in name input
        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') startCheckIn();
        });

        async function doCheckIn() {
            try {
                const checkinPayload = {
                    student_name: studentName,
                    pin: currentInput,
                    device_type: 'kiosk'
                };
                if (studentId) checkinPayload.student_id = studentId;
                const res = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(checkinPayload)
                });

                const data = await res.json();

                if (data.ok) {
                    showSuccess(studentName);
                } else {
                    showError(data.error || 'Check in failed');
                    currentInput = '';
                    updateDisplay();
                }
            } catch (err) {
                showError('Connection error');
                currentInput = '';
                updateDisplay();
            }
        }

        async function doCheckOut() {
            try {
                const checkoutPayload = {
                    student_name: studentName,
                    pin: currentInput
                };
                if (studentId) checkoutPayload.student_id = studentId;
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(checkoutPayload)
                });

                const data = await res.json();

                if (data.ok) {
                    showCheckOutSuccess(studentName);
                } else {
                    showError(data.error || 'Sign out failed');
                    currentInput = '';
                    updateDisplay();
                }
            } catch (err) {
                showError('Connection error');
                currentInput = '';
                updateDisplay();
            }
        }

        function showSuccess(name) {
            const overlay = document.getElementById('success-overlay');
            document.getElementById('success-name').textContent = name;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('hidden');
                resetKiosk();
            }, 3000);
        }

        function showCheckOutSuccess(name) {
            const overlay = document.getElementById('checkout-overlay');
            document.getElementById('checkout-name').textContent = name;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('hidden');
                resetKiosk();
            }, 3000);
        }

        function resetKiosk() {
            mode = '';
            studentName = '';
            studentId = '';
            currentInput = '';
            kioskStudentId.value = '';
            stepLabel.textContent = 'Enter your name';
            nameStep.classList.remove('hidden');
            keypad.classList.add('hidden');
            nameInput.value = '';
            errorMsg.classList.add('hidden');
            display.textContent = '\u00A0';
            nameInput.focus();
        }
    </script>
</body>
</html>
