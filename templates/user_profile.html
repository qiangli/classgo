<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - My Profile</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
        .section-card { transition: all 0.2s ease; }
        .view-val { min-height: 1.5em; }
        @media print { .no-print { display: none !important; } body { background: white !important; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-14 flex items-center justify-between px-5 sticky top-0 z-20 no-print">
        <div class="flex items-center gap-3">
            <a href="/dashboard" class="text-gray-400 hover:text-gray-600 transition" title="Back to Dashboard">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <span class="text-lg font-semibold text-gray-800" id="page-title">My Profile</span>
            <span id="status-badge" class="hidden text-xs px-2 py-1 rounded-full font-medium"></span>
        </div>
        <div class="flex items-center gap-2">
            <select id="child-select" class="hidden text-sm border border-gray-300 rounded-lg px-2 py-1.5"></select>
            <button onclick="toggleEdit()" id="edit-btn" class="hidden text-sm text-indigo-600 hover:text-indigo-800 border border-indigo-300 px-3 py-1.5 rounded-lg font-medium">Edit</button>
            <button onclick="cancelEdit()" id="cancel-btn" class="hidden text-sm text-gray-600 hover:text-gray-800 border border-gray-300 px-3 py-1.5 rounded-lg">Cancel</button>
            <button onclick="saveProfile()" id="save-btn" class="hidden text-sm text-white bg-indigo-600 hover:bg-indigo-700 px-4 py-1.5 rounded-lg font-medium">Save</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-6 px-4">
        <div id="status-msg" class="hidden mb-4 px-4 py-2 rounded-lg text-sm"></div>

        <!-- Personal Information -->
        <div class="section-card bg-white rounded-xl shadow-sm border border-gray-200 mb-5">
            <div class="px-5 py-3 border-b border-gray-200">
                <h2 class="text-base font-semibold text-gray-800">Personal Information</h2>
            </div>
            <div class="px-5 py-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="section-personal">
                <div data-field="s-first_name" data-label="First Name" data-required="true"></div>
                <div data-field="s-last_name" data-label="Last Name" data-required="true"></div>
                <div data-field="s-dob" data-label="Date of Birth" data-type="date"></div>
                <div data-field="s-birthplace" data-label="Where were you born?"></div>
                <div data-field="s-years_in_us" data-label="Years lived in the US"></div>
                <div data-field="s-first_language" data-label="First language learned"></div>
                <div data-field="s-email" data-label="Student Email" data-type="email"></div>
                <div data-field="s-phone" data-label="Cell Phone" data-type="tel"></div>
                <div data-field="s-address" data-label="Home Address" data-span="2"></div>
            </div>
        </div>

        <!-- Parent/Guardian -->
        <div class="section-card bg-white rounded-xl shadow-sm border border-gray-200 mb-5">
            <div class="px-5 py-3 border-b border-gray-200">
                <h2 class="text-base font-semibold text-gray-800">Parent / Guardian Information</h2>
            </div>
            <div class="px-5 py-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="section-parent">
                <div data-field="p-first_name" data-label="Parent First Name"></div>
                <div data-field="p-last_name" data-label="Parent Last Name"></div>
                <div data-field="p-email" data-label="Parent Email" data-type="email"></div>
                <div data-field="p-phone" data-label="Parent Phone" data-type="tel"></div>
                <div data-field="p-email2" data-label="Parent Email (2nd)" data-type="email"></div>
                <div data-field="p-phone2" data-label="Parent Phone (2nd)" data-type="tel"></div>
                <div data-field="p-address" data-label="Parent Address" data-span="2"></div>
            </div>
        </div>

        <!-- High School Education -->
        <div class="section-card bg-white rounded-xl shadow-sm border border-gray-200 mb-5">
            <div class="px-5 py-3 border-b border-gray-200">
                <h2 class="text-base font-semibold text-gray-800">High School Education</h2>
            </div>
            <div class="px-5 py-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="section-education">
                <div data-field="s-school" data-label="Current High School"></div>
                <div data-field="s-grade" data-label="Current Grade Level"></div>
                <div data-field="s-previous_schools" data-label="Previous High Schools" data-span="2"></div>
                <div data-field="s-courses_outside" data-label="Courses Outside High School" data-span="2" data-type="textarea" data-placeholder="e.g., Stanford Online, BYU, community colleges"></div>
            </div>
        </div>

        <!-- Tracker Item Sections (dynamically built) -->
        <div id="tracker-sections"></div>

        <!-- Notes -->
        <div class="section-card bg-white rounded-xl shadow-sm border border-gray-200 mb-5">
            <div class="px-5 py-3 border-b border-gray-200">
                <h2 class="text-base font-semibold text-gray-800">Notes</h2>
            </div>
            <div class="px-5 py-4">
                <div data-field="s-notes" data-label="" data-type="textarea" data-placeholder="Additional notes"></div>
            </div>
        </div>

        <!-- Bottom actions -->
        <div class="flex justify-end gap-3 mb-8 no-print" id="bottom-actions" style="display:none">
            <button onclick="cancelEdit()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 border border-gray-300 rounded-lg">Cancel</button>
            <button onclick="saveProfile()" class="px-6 py-2 text-sm text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg font-medium">Save Profile</button>
        </div>
    </main>

    <script>
        const studentID = '{{.StudentID}}';
        const userType = '{{.UserType}}';
        const entityID = '{{.EntityID}}';
        let profileData = null;
        let editMode = false;
        let fieldValues = {};
        let trackerFieldMap = {}; // tracker item id -> field element id

        // Category display order and labels matching .docx sections
        const categoryConfig = [
            { cat: 'GPA', title: 'GPA' },
            { cat: 'PSAT', title: 'Standardized Tests - PSAT' },
            { cat: 'SAT', title: 'Standardized Tests - SAT' },
            { cat: 'AP', title: 'AP Exams' },
            { cat: 'Math Competition', title: 'Math Competitions' },
            { cat: 'Extracurricular', title: 'Extracurricular Activities' },
            { cat: 'College Prep', title: 'College Prep' },
            { cat: 'Personal', title: 'Personal' }
        ];

        async function loadProfile() {
            try {
                const res = await fetch('/api/v1/user/profile?student_id=' + encodeURIComponent(studentID));
                const data = await res.json();
                if (!data.ok) { showStatus(data.error || 'Failed to load', 'error'); return; }
                profileData = data;

                const s = data.student;
                document.getElementById('page-title').textContent = s.first_name + ' ' + s.last_name + ' - Profile';

                // Store field values
                fieldValues = {};
                const sFields = ['first_name','last_name','grade','school','email','phone','address','notes',
                    'dob','birthplace','years_in_us','first_language','previous_schools','courses_outside'];
                sFields.forEach(f => fieldValues['s-' + f] = s[f] || '');

                const p = data.parent || {};
                ['first_name','last_name','email','phone','email2','phone2','address'].forEach(f => {
                    fieldValues['p-' + f] = p[f] || '';
                });

                // Status badge
                const badge = document.getElementById('status-badge');
                if (s.profile_status === 'draft') {
                    badge.textContent = 'Draft - pending review';
                    badge.className = 'text-xs px-2 py-1 rounded-full font-medium bg-amber-100 text-amber-700';
                } else if (s.profile_status === 'final') {
                    badge.textContent = 'Finalized';
                    badge.className = 'text-xs px-2 py-1 rounded-full font-medium bg-green-100 text-green-700';
                } else {
                    badge.className = 'hidden';
                }

                // Build tracker sections
                buildTrackerSections(data.tracker_items || [], data.tracker_values || {});

                // Child selector for parents
                if (userType === 'parent' && data.children && data.children.length > 1) {
                    const sel = document.getElementById('child-select');
                    sel.innerHTML = data.children.map(c =>
                        `<option value="${c.id}" ${c.id === studentID ? 'selected' : ''}>${esc(c.name)}</option>`
                    ).join('');
                    sel.classList.remove('hidden');
                    sel.onchange = () => { location.href = '/profile?student_id=' + sel.value; };
                }

                // Default to edit mode if empty profile
                if (data.is_empty_profile) {
                    setEditMode(true);
                } else {
                    setEditMode(false);
                }
            } catch(e) {
                showStatus('Failed to load profile: ' + e.message, 'error');
            }
        }

        function buildTrackerSections(items, values) {
            const container = document.getElementById('tracker-sections');
            container.innerHTML = '';
            trackerFieldMap = {};

            // Group items by category
            const groups = {};
            items.forEach(it => {
                const cat = it.category || 'General';
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(it);
            });

            categoryConfig.forEach(({ cat, title }) => {
                const catItems = groups[cat];
                if (!catItems || !catItems.length) return;

                let fieldsHTML = '';
                catItems.forEach(it => {
                    const fieldId = 'tracker-' + it.id;
                    trackerFieldMap[it.id] = fieldId;
                    const val = values[it.id] || '';
                    fieldValues[fieldId] = val;

                    const placeholder = it.notes || '';
                    const isLong = cat === 'Extracurricular' || cat === 'College Prep' || cat === 'Personal';
                    const type = isLong ? 'textarea' : 'text';
                    const span = isLong ? '2' : '';

                    fieldsHTML += `<div data-field="${fieldId}" data-label="${esc(it.name)}" data-type="${type}" data-placeholder="${esc(placeholder)}"${span ? ' data-span="2"' : ''}></div>`;
                });

                container.innerHTML += `
                    <div class="section-card bg-white rounded-xl shadow-sm border border-gray-200 mb-5">
                        <div class="px-5 py-3 border-b border-gray-200">
                            <h2 class="text-base font-semibold text-gray-800">${esc(title)}</h2>
                        </div>
                        <div class="px-5 py-4 grid grid-cols-1 md:grid-cols-2 gap-4">${fieldsHTML}</div>
                    </div>`;
            });
        }

        function setEditMode(on) {
            editMode = on;
            document.getElementById('edit-btn').classList.toggle('hidden', on);
            document.getElementById('save-btn').classList.toggle('hidden', !on);
            document.getElementById('cancel-btn').classList.toggle('hidden', !on);
            document.getElementById('bottom-actions').style.display = on ? 'flex' : 'none';
            renderAllFields();
        }

        function toggleEdit() { setEditMode(true); }
        function cancelEdit() { setEditMode(false); }

        function renderAllFields() {
            document.querySelectorAll('[data-field]').forEach(div => {
                const fieldId = div.dataset.field;
                const label = div.dataset.label;
                const type = div.dataset.type || 'text';
                const placeholder = div.dataset.placeholder || '';
                const required = div.dataset.required === 'true';
                const span = div.dataset.span;
                const val = fieldValues[fieldId] || '';

                if (span === '2') div.className = 'md:col-span-2';

                if (editMode) {
                    const reqMark = required ? ' <span class="text-red-400">*</span>' : '';
                    if (type === 'textarea') {
                        div.innerHTML = `<label class="block text-xs text-gray-500 mb-1">${label}${reqMark}</label>
                            <textarea id="${fieldId}" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="${esc(placeholder)}">${esc(val)}</textarea>`;
                    } else {
                        div.innerHTML = `<label class="block text-xs text-gray-500 mb-1">${label}${reqMark}</label>
                            <input type="${type}" id="${fieldId}" value="${esc(val)}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="${esc(placeholder)}">`;
                    }
                } else {
                    const displayVal = val || '<span class="text-gray-300">-</span>';
                    div.innerHTML = label
                        ? `<label class="block text-xs text-gray-500 mb-1">${label}</label><div class="view-val text-sm text-gray-800">${val ? esc(val) : '<span class="text-gray-300">-</span>'}</div>`
                        : `<div class="view-val text-sm text-gray-800">${val ? esc(val) : ''}</div>`;
                }
            });
        }

        async function saveProfile() {
            // Collect student fields
            const student = { id: studentID };
            ['first_name','last_name','grade','school','email','phone','address',
             'dob','birthplace','years_in_us','first_language','previous_schools'].forEach(f => {
                const el = document.getElementById('s-' + f);
                if (el) student[f] = el.value;
            });
            const coe = document.getElementById('s-courses_outside');
            if (coe) student.courses_outside = coe.value;
            const notesEl = document.getElementById('s-notes');
            if (notesEl) student.notes = notesEl.value;
            if (profileData && profileData.student) student.parent_id = profileData.student.parent_id || '';

            // Collect parent fields
            const parent = {};
            if (profileData && profileData.parent) parent.id = profileData.parent.id || '';
            ['first_name','last_name','email','phone','email2','phone2','address'].forEach(f => {
                const el = document.getElementById('p-' + f);
                if (el) parent[f] = el.value;
            });

            // Collect tracker values
            const tracker_values = {};
            for (const [itemId, fieldId] of Object.entries(trackerFieldMap)) {
                const el = document.getElementById(fieldId);
                if (el) tracker_values[itemId] = el.value;
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.textContent = 'Saving...';

            try {
                const res = await fetch('/api/v1/user/profile', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ student, parent, tracker_values })
                });
                const data = await res.json();
                if (data.ok) {
                    showStatus('Profile saved. It will be reviewed by your advisor.', 'success');
                    // Update local values
                    document.querySelectorAll('[data-field]').forEach(div => {
                        const el = document.getElementById(div.dataset.field);
                        if (el) fieldValues[div.dataset.field] = el.value;
                    });
                    setEditMode(false);
                    loadProfile(); // refresh status badge
                } else {
                    showStatus(data.error || 'Save failed.', 'error');
                }
            } catch(e) {
                showStatus('Save failed: ' + e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Save';
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = type === 'success'
                ? 'mb-4 px-4 py-2 rounded-lg text-sm bg-green-100 text-green-700'
                : 'mb-4 px-4 py-2 rounded-lg text-sm bg-red-100 text-red-700';
            el.classList.remove('hidden');
            if (type === 'success') setTimeout(() => el.classList.add('hidden'), 4000);
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
        }

        loadProfile();
    </script>
</body>
</html>
