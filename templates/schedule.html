<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - Schedule</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        @media print {
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .shadow { box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <header class="text-center mb-6">
            <div class="flex items-center justify-center gap-3">
                <img src="/static/logo.svg" alt="Logo" class="w-10 h-10">
                <h1 class="text-4xl font-bold text-indigo-600">{{.AppName}}</h1>
            </div>
            <p class="text-gray-500 mt-1">Weekly Schedule</p>
        </header>

        <!-- Navigation -->
        <div class="flex justify-center gap-4 mb-6 no-print">
            <a href="/admin" class="text-sm bg-white hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg shadow transition">
                Attendance
            </a>
            <span class="text-sm bg-indigo-600 text-white px-4 py-2 rounded-lg shadow">
                Schedule
            </span>
            <button onclick="window.print()" class="text-sm bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg transition">
                Print
            </button>
        </div>

        <!-- Conflicts Banner -->
        <div id="conflicts-banner" class="hidden mb-6">
            <div class="bg-amber-50 border border-amber-200 rounded-2xl shadow p-4">
                <h3 class="text-amber-700 font-semibold flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                    Schedule Conflicts
                </h3>
                <ul id="conflict-list" class="mt-2 text-sm text-amber-600 space-y-1"></ul>
            </div>
        </div>

        <!-- Weekly Calendar Grid -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4" id="week-grid">
            <!-- Filled by JS -->
        </div>

        <!-- Today's Sessions Detail -->
        <div class="mt-8 bg-white rounded-2xl shadow p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Today's Sessions</h2>
            <div id="today-sessions">
                <p class="text-gray-400 text-center py-4">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        const DAY_COLORS = {
            'Monday': 'indigo', 'Tuesday': 'blue', 'Wednesday': 'green',
            'Thursday': 'purple', 'Friday': 'orange'
        };

        async function loadSchedule() {
            try {
                const [weekRes, todayRes, conflictRes] = await Promise.all([
                    fetch('/api/v1/schedule/week'),
                    fetch('/api/v1/schedule/today'),
                    fetch('/api/v1/schedule/conflicts')
                ]);
                const weekSessions = await weekRes.json();
                const todaySessions = await todayRes.json();
                const conflicts = await conflictRes.json();

                renderWeekGrid(weekSessions);
                renderTodaySessions(todaySessions);
                renderConflicts(conflicts);
            } catch (err) {
                console.error('Failed to load schedule:', err);
            }
        }

        function renderWeekGrid(sessions) {
            const grid = document.getElementById('week-grid');
            const byDay = {};
            DAYS.forEach(d => byDay[d] = []);
            sessions.forEach(s => {
                if (byDay[s.day_of_week]) byDay[s.day_of_week].push(s);
            });

            const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });

            grid.innerHTML = DAYS.map(day => {
                const daySessions = byDay[day];
                const isToday = day === today;
                const borderClass = isToday ? 'ring-2 ring-indigo-400' : '';
                const headerBg = isToday ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700';

                let content = '';
                if (daySessions.length === 0) {
                    content = '<p class="text-gray-300 text-sm text-center py-4">No sessions</p>';
                } else {
                    content = daySessions.map(s => `
                        <div class="border-l-4 border-indigo-400 pl-3 py-2">
                            <p class="text-sm font-medium text-gray-800">${s.subject || 'Session'}</p>
                            <p class="text-xs text-gray-500">${s.start_time} - ${s.end_time}</p>
                            <p class="text-xs text-gray-400">${s.room_id || ''} ${s.teacher_id ? '| ' + s.teacher_id : ''}</p>
                            ${s.student_ids && s.student_ids.length > 0 ? `<p class="text-xs text-gray-400 mt-1">${s.student_ids.join(', ')}</p>` : ''}
                        </div>
                    `).join('');
                }

                return `
                    <div class="bg-white rounded-2xl shadow overflow-hidden ${borderClass}">
                        <div class="${headerBg} px-4 py-2 text-center font-semibold text-sm">${day}</div>
                        <div class="p-3 space-y-2">${content}</div>
                    </div>
                `;
            }).join('');
        }

        function renderTodaySessions(sessions) {
            const container = document.getElementById('today-sessions');
            if (sessions.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4">No sessions scheduled for today</p>';
                return;
            }

            container.innerHTML = `
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b text-sm text-gray-400">
                                <th class="py-2 px-3">Time</th>
                                <th class="py-2 px-3">Subject</th>
                                <th class="py-2 px-3">Room</th>
                                <th class="py-2 px-3">Teacher</th>
                                <th class="py-2 px-3">Students</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sessions.map(s => `
                                <tr class="border-b hover:bg-gray-50">
                                    <td class="py-2 px-3 text-sm font-medium">${s.start_time} - ${s.end_time}</td>
                                    <td class="py-2 px-3 text-sm">${s.subject || '-'}</td>
                                    <td class="py-2 px-3 text-sm text-gray-500">${s.room_id || '-'}</td>
                                    <td class="py-2 px-3 text-sm text-gray-500">${s.teacher_id || '-'}</td>
                                    <td class="py-2 px-3 text-sm text-gray-400">${(s.student_ids || []).join(', ') || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderConflicts(conflicts) {
            const banner = document.getElementById('conflicts-banner');
            const list = document.getElementById('conflict-list');
            if (conflicts.length === 0) {
                banner.classList.add('hidden');
                return;
            }
            banner.classList.remove('hidden');
            list.innerHTML = conflicts.map(c =>
                `<li class="flex items-start gap-2">
                    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${
                        c.type === 'room' ? 'bg-red-100 text-red-700' :
                        c.type === 'teacher' ? 'bg-orange-100 text-orange-700' :
                        'bg-yellow-100 text-yellow-700'
                    }">${c.type}</span>
                    <span>${c.detail}</span>
                </li>`
            ).join('');
        }

        loadSchedule();
    </script>
</body>
</html>
