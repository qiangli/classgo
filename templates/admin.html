<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - Admin</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .shadow { box-shadow: none !important; }
            table { font-size: 12px; }
            th, td { padding: 4px 8px !important; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <header class="text-center mb-8">
            <div class="flex items-center justify-center gap-3">
                <img src="/static/lern.png" alt="LERN" class="h-10">
                <h1 class="text-4xl font-bold text-indigo-600">{{.AppName}}</h1>
            </div>
            <p class="text-gray-500 mt-1">{{.Date}}</p>
        </header>

        <!-- Navigation -->
        <div class="flex justify-center gap-4 mb-6 no-print">
            <span class="text-sm bg-indigo-600 text-white px-4 py-2 rounded-lg shadow">
                Attendance
            </span>
            <a href="/schedule" class="text-sm bg-white hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg shadow transition">
                Schedule
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 no-print">
            <!-- PIN Card -->
            <div class="bg-white rounded-2xl shadow p-6 text-center">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wide">Today's PIN</h2>
                <p class="text-6xl font-mono font-bold text-indigo-600 mt-2 tracking-widest">{{.PIN}}</p>
                <p class="text-gray-400 text-sm mt-2">Share this PIN with your students</p>
            </div>

            <!-- QR Code Card -->
            <div class="bg-white rounded-2xl shadow p-6 text-center">
                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wide">Scan to Check In</h2>
                <img id="qr-img" src="{{.QRDataURIMDNS}}" alt="QR Code"
                    class="mx-auto mt-2 w-48 h-48 cursor-pointer" title="Tap to toggle IP/mDNS"
                    onclick="toggleQR()"
                    data-qr-mdns="{{.QRDataURIMDNS}}" data-qr-ip="{{.QRDataURIIP}}">
                <p id="qr-url" class="text-xs text-gray-400 mt-2 break-all">{{.ServerURLMDNS}}</p>
                <p class="text-xs text-gray-300 mt-1 cursor-pointer select-none" onclick="toggleQR()">tap QR to switch</p>
            </div>
        </div>

        <!-- Attendance Table -->
        <div class="bg-white rounded-2xl shadow p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-700">
                    Attendance
                    <span id="count" class="ml-2 bg-indigo-100 text-indigo-600 text-sm font-bold px-2 py-1 rounded-full">{{.Count}}</span>
                </h2>
                <div class="flex gap-2 no-print">
                    <button onclick="exportCSV()" class="text-sm bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition">
                        Export CSV
                    </button>
                    <button onclick="window.print()" class="text-sm bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg transition">
                        Print
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b text-sm text-gray-400">
                            <th class="py-2 px-3 cursor-pointer hover:text-gray-600 select-none" onclick="sortBy('student_name')">
                                Name <span id="sort-student_name" class="sort-arrow"></span>
                            </th>
                            <th class="py-2 px-3 cursor-pointer hover:text-gray-600 select-none" onclick="sortBy('device_type')">
                                Device <span id="sort-device_type" class="sort-arrow"></span>
                            </th>
                            <th class="py-2 px-3 cursor-pointer hover:text-gray-600 select-none" onclick="sortBy('check_in')">
                                Check In <span id="sort-check_in" class="sort-arrow"></span>
                            </th>
                            <th class="py-2 px-3 cursor-pointer hover:text-gray-600 select-none" onclick="sortBy('check_out')">
                                Check Out <span id="sort-check_out" class="sort-arrow"></span>
                            </th>
                            <th class="py-2 px-3 cursor-pointer hover:text-gray-600 select-none" onclick="sortBy('duration')">
                                Duration <span id="sort-duration" class="sort-arrow"></span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="attendee-list"></tbody>
                </table>
                <p id="empty-msg" class="hidden text-center text-gray-400 py-8">No students signed in yet</p>
            </div>
        </div>
    </div>

    <script>
        let qrShowingMDNS = true;
        const qrURLMDNS = "{{.ServerURLMDNS}}";
        const qrURLIP = "{{.ServerURLIP}}";

        function toggleQR() {
            const img = document.getElementById('qr-img');
            const urlEl = document.getElementById('qr-url');
            qrShowingMDNS = !qrShowingMDNS;
            if (qrShowingMDNS) {
                img.src = img.dataset.qrMdns;
                urlEl.textContent = qrURLMDNS;
            } else {
                img.src = img.dataset.qrIp;
                urlEl.textContent = qrURLIP;
            }
        }

        let attendeesData = [];
        let sortColumn = 'check_in';
        let sortAsc = false; // default: newest first

        function updateSortArrows() {
            document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
            const arrowEl = document.getElementById('sort-' + sortColumn);
            if (arrowEl) arrowEl.textContent = sortAsc ? ' \u25B2' : ' \u25BC';
        }
        updateSortArrows();

        function sortBy(col) {
            if (sortColumn === col) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = col;
                sortAsc = (col === 'student_name' || col === 'device_type');
            }
            renderAttendees();
        }

        function getSortValue(a, col) {
            switch (col) {
                case 'student_name': return (a.student_name || '').toLowerCase();
                case 'device_type': return a.device_type || '';
                case 'check_in': return a.check_in_raw || '';
                case 'check_out': return a.check_out_raw || '';
                case 'duration': return a.duration_minutes || 0;
            }
            return '';
        }

        function renderAttendees() {
            const tbody = document.getElementById('attendee-list');
            const countEl = document.getElementById('count');
            const emptyMsg = document.getElementById('empty-msg');

            countEl.textContent = attendeesData.length;

            updateSortArrows();

            if (attendeesData.length === 0) {
                tbody.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                return;
            }

            emptyMsg.classList.add('hidden');

            tbody.innerHTML = getSortedAttendees().map(a => {
                const checkInStr = a.check_in_time;
                let checkOutStr = '<span class="text-green-500">active</span>';
                let durationStr = '\u2014';
                if (a.check_out_time) {
                    checkOutStr = a.check_out_time;
                    durationStr = a.duration;
                }
                const badge = a.device_type === 'mobile'
                    ? 'bg-blue-100 text-blue-600'
                    : 'bg-purple-100 text-purple-600';
                return `<tr class="border-b hover:bg-gray-50">
                    <td class="py-2 px-3 font-medium">${a.student_name}</td>
                    <td class="py-2 px-3"><span class="text-xs px-2 py-1 rounded-full ${badge}">${a.device_type}</span></td>
                    <td class="py-2 px-3 text-sm text-gray-500">${checkInStr}</td>
                    <td class="py-2 px-3 text-sm text-gray-500">${checkOutStr}</td>
                    <td class="py-2 px-3 text-sm text-gray-500">${durationStr}</td>
                </tr>`;
            }).join('');
        }

        function refreshAttendees() {
            fetch('/api/attendees')
                .then(r => r.json())
                .then(attendees => {
                    attendeesData = attendees;
                    renderAttendees();
                })
                .catch(err => console.error('Refresh failed:', err));
        }

        function getSortedAttendees() {
            return [...attendeesData].sort((a, b) => {
                let va = getSortValue(a, sortColumn);
                let vb = getSortValue(b, sortColumn);
                if (typeof va === 'number') {
                    return sortAsc ? va - vb : vb - va;
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        function exportCSV() {
            const sorted = getSortedAttendees();
            const rows = [['Name', 'Device', 'Check In', 'Check Out', 'Duration']];
            sorted.forEach(a => {
                rows.push([
                    a.student_name,
                    a.device_type,
                    a.check_in_time,
                    a.check_out_time || '',
                    a.duration || ''
                ]);
            });
            const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const today = new Date().toISOString().slice(0, 10);
            a.download = 'classgo-export-' + today + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initial load + auto-refresh
        refreshAttendees();
        setInterval(refreshAttendees, 5000);
    </script>
</body>
</html>
