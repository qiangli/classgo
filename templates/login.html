<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - Login</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center mb-6">
                <img src="/static/lern.png" alt="{{.AppName}}" class="h-14 mx-auto mb-2">
            </div>

            <!-- User Login (default) -->
            <div id="user-login">
                <p class="text-gray-500 text-sm text-center mb-4">Sign in to continue</p>

                <!-- User search -->
                <div class="mb-4 relative">
                    <label class="block text-sm text-gray-600 mb-1">Find your account</label>
                    <input type="text" id="user-search" autocomplete="off" placeholder="Name, ID, email, or phone..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none text-sm">
                    <ul id="user-results" class="hidden absolute left-0 right-0 top-full mt-1 bg-white border rounded-lg shadow-lg z-10 max-h-48 overflow-y-auto"></ul>
                </div>

                <!-- Selected user display -->
                <div id="selected-user" class="hidden mb-4 bg-indigo-50 rounded-lg px-4 py-3 flex items-center justify-between">
                    <div>
                        <p id="sel-name" class="font-medium text-gray-800 text-sm"></p>
                        <p id="sel-detail" class="text-xs text-gray-500"></p>
                    </div>
                    <button onclick="clearSelection()" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
                </div>

                <!-- Password (shown after selection) -->
                <div id="password-section" class="hidden">
                    <div class="mb-4">
                        <label class="block text-sm text-gray-600 mb-1" id="pwd-label">Password</label>
                        <input type="password" id="user-password" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none text-sm"
                            placeholder="Enter your password"
                            onkeydown="if(event.key==='Enter') submitUserLogin()">
                    </div>
                    <!-- Confirm password for first-time setup -->
                    <div id="confirm-section" class="hidden mb-4">
                        <label class="block text-sm text-gray-600 mb-1">Confirm Password</label>
                        <input type="password" id="user-password-confirm"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none text-sm"
                            placeholder="Confirm your password"
                            onkeydown="if(event.key==='Enter') submitUserLogin()">
                    </div>
                    <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-2 mb-4"></div>
                    <button onclick="submitUserLogin()" id="login-btn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition text-sm">
                        Sign In
                    </button>
                </div>

                <div class="mt-6 pt-4 border-t text-center">
                    <button onclick="showAdminLogin()" class="text-xs text-gray-400 hover:text-gray-600 transition">Admin Login</button>
                </div>
            </div>

            <!-- Admin Login (toggle) -->
            <div id="admin-login" class="hidden">
                <p class="text-gray-500 text-sm text-center mb-4">Admin Login (System Account)</p>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">System Username</label>
                    <input type="text" id="admin-username" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none text-sm"
                        placeholder="OS username">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">System Password</label>
                    <input type="password" id="admin-password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none text-sm"
                        placeholder="OS password"
                        onkeydown="if(event.key==='Enter') submitAdminLogin()">
                </div>
                <div id="admin-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-2 mb-4"></div>
                <button onclick="submitAdminLogin()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition text-sm">
                    Sign In as Admin
                </button>
                <div class="mt-4 text-center">
                    <button onclick="showUserLogin()" class="text-xs text-gray-400 hover:text-gray-600 transition">Back to User Login</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedEntity = null;
        let isFirstTime = false;
        let searchTimeout = null;

        // ==================== SEARCH ====================
        const searchInput = document.getElementById('user-search');
        const resultsList = document.getElementById('user-results');

        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const q = this.value.trim();
            if (q.length < 2) { resultsList.classList.add('hidden'); return; }
            searchTimeout = setTimeout(() => doSearch(q), 200);
        });

        async function doSearch(q) {
            try {
                const res = await fetch('/api/users/search?q=' + encodeURIComponent(q));
                const results = await res.json();
                if (!results.length) { resultsList.classList.add('hidden'); return; }
                resultsList.innerHTML = results.map(r =>
                    `<li data-id="${r.id}" data-type="${r.type}" data-name="${r.first_name} ${r.last_name}" data-email="${r.email}" data-phone="${r.phone}"
                         class="px-4 py-2.5 cursor-pointer hover:bg-indigo-50 border-b last:border-0 text-sm">
                        <span class="font-medium text-gray-800">${r.first_name} ${r.last_name}</span>
                        <span class="text-gray-400 ml-1">(${r.id})</span>
                        <span class="text-xs px-1.5 py-0.5 rounded-full ml-1 ${r.type==='Student'?'bg-blue-100 text-blue-600':r.type==='Parent'?'bg-green-100 text-green-600':'bg-purple-100 text-purple-600'}">${r.type}</span>
                        ${r.email ? `<span class="text-gray-400 text-xs block mt-0.5">${r.email}</span>` : ''}
                    </li>`
                ).join('');
                resultsList.querySelectorAll('li').forEach(li => {
                    li.addEventListener('click', () => selectUser(li));
                });
                resultsList.classList.remove('hidden');
            } catch(e) { resultsList.classList.add('hidden'); }
        }

        function selectUser(li) {
            selectedEntity = {
                id: li.dataset.id,
                type: li.dataset.type,
                name: li.dataset.name,
                email: li.dataset.email,
                phone: li.dataset.phone
            };
            resultsList.classList.add('hidden');
            searchInput.classList.add('hidden');
            document.querySelector('label[for="user-search"], .mb-4.relative label').classList.add('hidden');

            document.getElementById('sel-name').textContent = selectedEntity.name;
            document.getElementById('sel-detail').textContent = `${selectedEntity.type} - ${selectedEntity.id}` + (selectedEntity.email ? ` - ${selectedEntity.email}` : '');
            document.getElementById('selected-user').classList.remove('hidden');

            // Check if first-time login
            checkFirstTime(selectedEntity.id);
        }

        async function checkFirstTime(entityId) {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'check', entity_id: entityId })
                });
                const result = await res.json();
                isFirstTime = !result.has_password;
                document.getElementById('password-section').classList.remove('hidden');
                if (isFirstTime) {
                    document.getElementById('pwd-label').textContent = 'Create a Password (first time)';
                    document.getElementById('user-password').placeholder = 'Choose a password (min 4 chars)';
                    document.getElementById('confirm-section').classList.remove('hidden');
                    document.getElementById('login-btn').textContent = 'Create Account & Sign In';
                } else {
                    document.getElementById('pwd-label').textContent = 'Password';
                    document.getElementById('user-password').placeholder = 'Enter your password';
                    document.getElementById('confirm-section').classList.add('hidden');
                    document.getElementById('login-btn').textContent = 'Sign In';
                }
                document.getElementById('user-password').focus();
            } catch(e) {
                document.getElementById('password-section').classList.remove('hidden');
            }
        }

        function clearSelection() {
            selectedEntity = null;
            isFirstTime = false;
            searchInput.value = '';
            searchInput.classList.remove('hidden');
            document.querySelector('.mb-4.relative label').classList.remove('hidden');
            document.getElementById('selected-user').classList.add('hidden');
            document.getElementById('password-section').classList.add('hidden');
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('user-password').value = '';
            document.getElementById('user-password-confirm').value = '';
            searchInput.focus();
        }

        // ==================== USER LOGIN ====================
        async function submitUserLogin() {
            if (!selectedEntity) return;
            const password = document.getElementById('user-password').value;
            const errorEl = document.getElementById('login-error');

            if (password.length < 4) {
                errorEl.textContent = 'Password must be at least 4 characters';
                errorEl.classList.remove('hidden');
                return;
            }

            if (isFirstTime) {
                const confirm = document.getElementById('user-password-confirm').value;
                if (password !== confirm) {
                    errorEl.textContent = 'Passwords do not match';
                    errorEl.classList.remove('hidden');
                    return;
                }
            }

            errorEl.classList.add('hidden');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: isFirstTime ? 'setup' : 'login',
                        entity_id: selectedEntity.id,
                        password: password
                    })
                });
                const result = await res.json();
                if (result.ok) {
                    window.location.href = result.redirect || '/memos/';
                } else {
                    errorEl.textContent = result.error || 'Login failed';
                    errorEl.classList.remove('hidden');
                }
            } catch(e) {
                errorEl.textContent = 'Login failed';
                errorEl.classList.remove('hidden');
            }
        }

        // ==================== ADMIN LOGIN ====================
        function showAdminLogin() {
            document.getElementById('user-login').classList.add('hidden');
            document.getElementById('admin-login').classList.remove('hidden');
            document.getElementById('admin-username').focus();
        }

        function showUserLogin() {
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('user-login').classList.remove('hidden');
            searchInput.focus();
        }

        async function submitAdminLogin() {
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('admin-error');

            if (!username || !password) {
                errorEl.textContent = 'Username and password required';
                errorEl.classList.remove('hidden');
                return;
            }

            errorEl.classList.add('hidden');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'admin', username, password })
                });
                const result = await res.json();
                if (result.ok) {
                    window.location.href = result.redirect || '/admin';
                } else {
                    errorEl.textContent = result.error || 'Login failed';
                    errorEl.classList.remove('hidden');
                }
            } catch(e) {
                errorEl.textContent = 'Login failed';
                errorEl.classList.remove('hidden');
            }
        }

        // Close search results on click outside
        document.addEventListener('click', e => {
            if (!e.target.closest('.relative')) resultsList.classList.add('hidden');
        });
    </script>
</body>
</html>
