<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - Sign In</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-indigo-50 to-white min-h-screen flex items-center justify-center p-4">

    <!-- Success Overlay -->
    <div id="success-overlay" class="hidden fixed inset-0 bg-green-500 flex flex-col items-center justify-center z-50 transition-opacity duration-300">
        <div class="text-white text-8xl mb-4">&#10003;</div>
        <p id="success-name" class="text-white text-4xl font-bold text-center px-4"></p>
        <p id="success-status" class="text-green-100 text-xl mt-2">Signed in!</p>
    </div>

    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2">
                <img src="/static/logo.svg" alt="Logo" class="w-8 h-8">
                <h1 class="text-3xl font-bold text-indigo-600">{{.AppName}}</h1>
            </div>
            <p class="text-gray-400 mt-1">Sign in to class</p>
        </div>

        <!-- Confirmation Card (shown after sign-in) -->
        <div id="confirmed-card" class="hidden bg-white rounded-2xl shadow-lg p-6 mb-4">
            <div class="text-center">
                <div id="confirmed-icon" class="text-green-500 text-6xl mb-3">&#10003;</div>
                <p id="confirmed-name" class="text-2xl font-bold text-gray-800"></p>
                <p id="confirmed-status" class="text-green-600 mt-1">Signed in!</p>
            </div>
            <button id="signout-btn" onclick="doSignOut()"
                class="w-full mt-4 py-3 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-xl transition">
                Sign Out
            </button>
            <button id="twistie-btn" onclick="toggleForm()"
                class="w-full mt-2 py-2 text-sm text-gray-400 hover:text-gray-600 transition flex items-center justify-center gap-1">
                <span id="twistie-arrow" class="inline-block transition-transform duration-200">&#9656;</span>
                Sign in again
            </button>
        </div>

        <!-- Sign-in Form Card -->
        <div id="signin-card" class="bg-white rounded-2xl shadow-lg p-6">
            <div id="message" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

            <form id="signin-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Your Name</label>
                    <input type="text" id="student-name" required autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
                        placeholder="e.g. Jane Doe">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">PIN</label>
                    <input type="text" id="pin" required inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-center text-2xl tracking-widest"
                        placeholder="----">
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 text-indigo-600 rounded">
                    <label for="remember-me" class="text-sm text-gray-500">Remember me</label>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('signin-form');
        const studentNameInput = document.getElementById('student-name');
        const pinInput = document.getElementById('pin');
        const rememberMe = document.getElementById('remember-me');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');
        const signinCard = document.getElementById('signin-card');
        const confirmedCard = document.getElementById('confirmed-card');
        const twistieArrow = document.getElementById('twistie-arrow');
        const signoutBtn = document.getElementById('signout-btn');

        let formExpanded = false;

        // Restore saved data
        const saved = localStorage.getItem('classgo_student');
        if (saved) {
            const data = JSON.parse(saved);
            studentNameInput.value = data.name || '';
            rememberMe.checked = true;

            if (data.name) {
                checkStatus(data.name);
            }
        }

        async function checkStatus(name) {
            try {
                const res = await fetch('/api/status?student_name=' + encodeURIComponent(name));
                const data = await res.json();
                if (data.signed_in) {
                    showConfirmation(name, true, data.signed_out);
                }
            } catch (err) {
                // Status check failed — just show the form
            }
        }

        function showConfirmation(name, alreadySignedIn, signedOut) {
            document.getElementById('confirmed-name').textContent = name;
            if (signedOut) {
                document.getElementById('confirmed-icon').innerHTML = '&#128075;';
                document.getElementById('confirmed-status').textContent = 'Signed out!';
                document.getElementById('confirmed-status').className = 'text-gray-500 mt-1';
                signoutBtn.classList.add('hidden');
            } else {
                document.getElementById('confirmed-icon').innerHTML = '&#10003;';
                document.getElementById('confirmed-status').textContent = alreadySignedIn ? 'Already signed in!' : 'Signed in!';
                document.getElementById('confirmed-status').className = 'text-green-600 mt-1';
                signoutBtn.classList.remove('hidden');
            }
            confirmedCard.classList.remove('hidden');
            signinCard.classList.add('hidden');
            formExpanded = false;
            twistieArrow.style.transform = '';
        }

        function toggleForm() {
            formExpanded = !formExpanded;
            if (formExpanded) {
                signinCard.classList.remove('hidden');
                twistieArrow.style.transform = 'rotate(90deg)';
            } else {
                signinCard.classList.add('hidden');
                twistieArrow.style.transform = '';
            }
        }

        function showMessage(text, success) {
            messageEl.textContent = text;
            messageEl.className = `mb-4 p-3 rounded-lg text-sm text-center ${success ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            messageEl.classList.remove('hidden');
        }

        function showSuccess(name, alreadySignedIn) {
            const overlay = document.getElementById('success-overlay');
            document.getElementById('success-name').textContent = name;
            document.getElementById('success-status').textContent = alreadySignedIn ? 'Already signed in!' : 'Signed in!';
            overlay.classList.remove('hidden');

            setTimeout(() => {
                overlay.classList.add('hidden');
                showConfirmation(name, alreadySignedIn, false);
            }, 3000);
        }

        async function doSignOut() {
            const name = document.getElementById('confirmed-name').textContent;
            const pin = prompt('Enter PIN to sign out:');
            if (!pin) return;

            try {
                const res = await fetch('/api/signout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ student_name: name, pin: pin })
                });
                const data = await res.json();
                if (data.ok) {
                    showConfirmation(name, false, true);
                } else {
                    alert(data.error || 'Sign out failed');
                }
            } catch (err) {
                alert('Connection error');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            messageEl.classList.add('hidden');

            try {
                const res = await fetch('/api/signin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        student_name: studentNameInput.value.trim(),
                        pin: pinInput.value.trim(),
                        device_type: 'mobile'
                    })
                });

                const data = await res.json();

                if (data.ok) {
                    const alreadySignedIn = (data.message || '').toLowerCase().includes('already');
                    showSuccess(studentNameInput.value.trim(), alreadySignedIn);
                    pinInput.value = '';

                    if (rememberMe.checked) {
                        localStorage.setItem('classgo_student', JSON.stringify({
                            name: studentNameInput.value.trim()
                        }));
                    } else {
                        localStorage.removeItem('classgo_student');
                    }
                } else {
                    showMessage(data.error || 'Sign in failed', false);
                }
            } catch (err) {
                showMessage('Connection error. Are you on the right network?', false);
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
