<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.AppName}} - Sign In</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-indigo-50 to-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2">
                <img src="/static/logo.svg" alt="Logo" class="w-8 h-8">
                <h1 class="text-3xl font-bold text-indigo-600">{{.AppName}}</h1>
            </div>
            <p class="text-gray-400 mt-1">Sign in to class</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6">
            <div id="message" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

            <form id="signin-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Student ID</label>
                    <input type="text" id="student-id" required autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
                        placeholder="e.g. S001">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Your Name</label>
                    <input type="text" id="student-name" required autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none"
                        placeholder="e.g. Jane Doe">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">PIN</label>
                    <input type="text" id="pin" required inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-center text-2xl tracking-widest"
                        placeholder="----">
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 text-indigo-600 rounded">
                    <label for="remember-me" class="text-sm text-gray-500">Remember me</label>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('signin-form');
        const studentIdInput = document.getElementById('student-id');
        const studentNameInput = document.getElementById('student-name');
        const pinInput = document.getElementById('pin');
        const rememberMe = document.getElementById('remember-me');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');

        // Restore saved data
        const saved = localStorage.getItem('classgo_student');
        if (saved) {
            const data = JSON.parse(saved);
            studentIdInput.value = data.id || '';
            studentNameInput.value = data.name || '';
            rememberMe.checked = true;
        }

        function showMessage(text, success) {
            messageEl.textContent = text;
            messageEl.className = `mb-4 p-3 rounded-lg text-sm text-center ${success ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            messageEl.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/signin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        student_id: studentIdInput.value.trim(),
                        student_name: studentNameInput.value.trim(),
                        pin: pinInput.value.trim(),
                        device_type: 'mobile'
                    })
                });

                const data = await res.json();
                showMessage(data.message || data.error, data.ok);

                if (data.ok && rememberMe.checked) {
                    localStorage.setItem('classgo_student', JSON.stringify({
                        id: studentIdInput.value.trim(),
                        name: studentNameInput.value.trim()
                    }));
                } else if (!rememberMe.checked) {
                    localStorage.removeItem('classgo_student');
                }

                if (data.ok) pinInput.value = '';
            } catch (err) {
                showMessage('Connection error. Are you on the right network?', false);
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
